{%load static%}<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Completado</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .success-container {
            text-align: center;
        }

        .success-card {
            background: #fff;
            color: #333;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            margin: auto;
        }

        .success-icon {
            font-size: 50px;
            color: #4caf50;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #4caf50;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-card">
            <img src="{% static 'img/cobranding-alianza.png' %}" alt="Cobranding Alianza" style="margin-bottom: 10px;width: 14.5em;">
            <div class="success-icon">
                <i class="checkmark">✔</i>
            </div>
            <h1>¡Registro Completado!</h1>
            <p>Tu información ha sido registrada exitosamente.</p>
        </div>
    </div>
</body>
</html>
